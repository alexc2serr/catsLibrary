<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quark — REST Client</title>
  <meta name="description" content="Premium API Client for USJ HTTP Server" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --bg-panel: #18181b;
      --bg-elevated: #27272a;
      --border: #3f3f46;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --accent: #06b6d4;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      
      /* Status Colors */
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.15);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.15);
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.15);
      --info: #3b82f6;

      --radius: 12px;
      --font-sans: 'Outfit', system-ui, sans-serif;
      --font-mono: 'Fira Code', monospace;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.08), transparent 25%);
    }

    /* ─── Layout ─── */
    .sidebar {
      width: 280px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-divider {
      height: 1px;
      background: var(--border);
      position: relative;
    }

    /* ─── Sidebar ─── */
    .brand {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 1.2rem;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }
    .brand-text {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .history-header {
      padding: 16px 20px 8px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .history-item:hover {
      background: var(--bg-elevated);
    }
    .history-item.active {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .method-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      width: 46px;
      text-align: center;
    }
    .method-GET { color: var(--info); background: rgba(59, 130, 246, 0.15); }
    .method-POST { color: var(--success); background: var(--success-bg); }
    .method-PUT { color: var(--warning); background: var(--warning-bg); }
    .method-DELETE { color: var(--error); background: var(--error-bg); }
    .method-HEAD { color: #a855f7; background: rgba(168, 85, 247, 0.15); }

    .history-url {
      font-size: 0.8rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* ─── Top Bar (URL & Method) ─── */
    .request-bar {
      padding: 20px 32px;
      background: var(--bg-panel);
      display: flex;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .input-group {
      display: flex;
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
    }
    .input-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    select {
      background: var(--bg-elevated);
      color: var(--text);
      border: none;
      padding: 0 16px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      border-right: 1px solid var(--border);
    }
    select:focus { background: var(--border); }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0 16px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      outline: none;
    }

    .btn {
      padding: 0 24px;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }
    .btn-primary:active {
      transform: translateY(1px);
    }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
    }
    .tab {
      padding: 12px 20px;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ─── Content Areas ─── */
    .content-area {
      flex: 1;
      padding: 20px 32px;
      overflow-y: auto;
      display: none;
    }
    .content-area.active { display: block; }

    textarea {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      resize: none;
      outline: none;
      transition: var(--transition);
    }
    textarea:focus {
      border-color: var(--primary);
    }

    /* ─── Key-Value Editor ─── */
    .kv-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .kv-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
    }
    .kv-row input:focus { border-color: var(--primary); }
    .btn-icon {
      background: var(--bg-elevated);
      color: var(--text-muted);
      border: 1px solid var(--border);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-icon:hover {
      background: var(--error-bg);
      color: var(--error);
      border-color: var(--error);
    }

    .btn-add {
      background: transparent;
      color: var(--primary);
      border: 1px dashed var(--primary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: var(--transition);
    }
    .btn-add:hover {
      background: rgba(139, 92, 246, 0.1);
    }

    /* ─── Response Section ─── */
    .response-meta {
      display: flex;
      gap: 20px;
      padding: 16px 32px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .status-badge {
      font-family: var(--font-mono);
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      color: white;
    }
    .status-ok { background: var(--success); }
    .status-warn { background: var(--warning); }
    .status-err { background: var(--error); }

    .response-viewer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow: auto;
      height: 100%;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .string { color: #a5d6ff; }
    .number { color: #79c0ff; }
    .boolean { color: #ff7b72; }
    .null { color: #8b949e; }
    .key { color: #7ee787; }

    /* ─── Loader ─── */
    .loader {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary.loading .loader { display: block; }
    .btn-primary.loading span { display: none; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
    .cors-warning {
      background: var(--warning-bg);
      color: var(--warning);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">N</div>
      <div class="brand-text">Quark API</div>
    </div>
    <div class="history-header">History</div>
    <div class="history-list" id="history-list">
      <!-- History items injected here -->
    </div>
  </aside>

  <!-- Main Workspace -->
  <main class="main">
    
    <!-- Request Bar -->
    <div class="request-bar">
      <div class="input-group">
        <select id="method">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
          <option value="PATCH">PATCH</option>
          <option value="HEAD">HEAD</option>
          <option value="OPTIONS">OPTIONS</option>
        </select>
        <input type="text" id="url" placeholder="http://127.0.0.1:3000/api/cats" value="http://127.0.0.1:3000/api/cats" autocomplete="off" spellcheck="false" />
      </div>
      <button class="btn btn-primary" id="send-btn" onclick="sendRequest()">
        <span>Send Request</span>
        <div class="loader"></div>
      </button>
    </div>

    <!-- Request Pane -->
    <div class="pane">
      <div class="tabs">
        <div class="tab active" onclick="switchReqTab('headers')">Headers</div>
        <div class="tab" onclick="switchReqTab('body')">Body (JSON)</div>
      </div>
      
      <div id="req-headers" class="content-area active">
        <div class="cors-warning">
          <span>⚠️</span>
          <div>
            <strong>Browser CORS applies:</strong> Requests to external APIs (not on this server) will only succeed if the target server allows Cross-Origin Resource Sharing (CORS).
          </div>
        </div>
        <div id="headers-list"></div>
        <button class="btn-add" onclick="addHeaderRow()">+ Add Header</button>
      </div>

      <div id="req-body" class="content-area">
        <textarea id="body-editor" placeholder="Enter JSON body here..."></textarea>
      </div>
    </div>

    <div class="pane-divider"></div>

    <!-- Response Pane -->
    <div class="pane">
      <div class="response-meta">
        <div class="meta-item">
          Status: <span id="res-status" class="status-badge status-ok" style="display:none;">-</span>
        </div>
        <div class="meta-item">Time: <strong id="res-time" style="color:var(--text)">-</strong></div>
        <div class="meta-item">Size: <strong id="res-size" style="color:var(--text)">-</strong></div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchResTab('body')">Response</div>
        <div class="tab" onclick="switchResTab('headers')">Headers</div>
      </div>

      <div id="res-body" class="content-area active">
        <pre class="response-viewer" id="res-viewer">Hit "Send Request" to see the response here.</pre>
      </div>
      
      <div id="res-headers" class="content-area">
        <pre class="response-viewer" id="res-headers-viewer">No headers yet.</pre>
      </div>
    </div>

  </main>

  <script>
    // ─── State ───
    let history = [];
    const API_KEY_DEFAULT = 'supersecret-key-123';

    // ─── Initialize ───
    addHeaderRow('X-API-Key', API_KEY_DEFAULT);
    addHeaderRow('Content-Type', 'application/json');

    // ─── Tabs Logic ───
    function switchReqTab(tabId) {
      document.querySelectorAll('#req-headers, #req-body').forEach(el => el.classList.remove('active'));
      document.querySelector('.pane:nth-child(2) .tab.active').classList.remove('active');
      document.getElementById(`req-${tabId}`).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function switchResTab(tabId) {
      document.querySelectorAll('#res-body, #res-headers').forEach(el => el.classList.remove('active'));
      document.querySelector('.pane:nth-child(4) .tab.active').classList.remove('active');
      document.getElementById(`res-${tabId}`).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // ─── Headers Logic ───
    function addHeaderRow(key = '', val = '') {
      const id = Date.now() + Math.random();
      const html = `
        <div class="kv-row" id="hdr-${id}">
          <input type="text" placeholder="Key" class="hdr-k" value="${key}">
          <input type="text" placeholder="Value" class="hdr-v" value="${val}">
          <button class="btn-icon" onclick="document.getElementById('hdr-${id}').remove()">✕</button>
        </div>
      `;
      document.getElementById('headers-list').insertAdjacentHTML('beforeend', html);
    }

    function getHeaders() {
      const headers = {};
      document.querySelectorAll('.kv-row').forEach(row => {
        const k = row.querySelector('.hdr-k').value.trim();
        const v = row.querySelector('.hdr-v').value.trim();
        if (k) headers[k] = v;
      });
      return headers;
    }

    // ─── Syntax Highlighting ───
    function syntaxHighlight(json) {
      if (typeof json != 'string') {
         json = JSON.stringify(json, undefined, 2);
      }
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
        let cls = 'number';
        if (/^"/.test(match)) {
            if (/:$/.test(match)) cls = 'key';
            else cls = 'string';
        } else if (/true|false/.test(match)) {
            cls = 'boolean';
        } else if (/null/.test(match)) {
            cls = 'null';
        }
        return '<span class="' + cls + '">' + match + '</span>';
      });
    }

    function formatBytes(bytes, decimals = 2) {
      if (!+bytes) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    // ─── Request Logic ───
    async function sendRequest() {
      const method = document.getElementById('method').value;
      const url = document.getElementById('url').value.trim();
      const bodyTxt = document.getElementById('body-editor').value;
      const headers = getHeaders();
      const btn = document.getElementById('send-btn');
      
      if (!url) {
        alert("Please enter a URL");
        return;
      }

      const opts = { method, headers };
      if (['POST', 'PUT', 'PATCH'].includes(method) && bodyTxt) {
        opts.body = bodyTxt;
      }

      btn.classList.add('loading');
      const startTime = performance.now();
      
      try {
        let fetchUrl = url;
        let fetchOpts = opts;

        // Auto-detect external URLs and use proxy to avoid CORS
        const isLocal = url.startsWith(window.location.origin) || url.startsWith('/') || url.startsWith('http://127.0.0.1') || url.startsWith('http://localhost');
        
        if (!isLocal) {
          fetchUrl = '/api/proxy';
          fetchOpts = {
            method: 'POST',
            // Always authenticate the local proxy request, regardless of what the user sets for the external API
            headers: { 
              'X-API-Key': 'supersecret-key-123',
              'Content-Type': 'application/json' 
            },
            body: JSON.stringify({
              url: url,
              method: opts.method,
              headers: opts.headers,
              body: opts.body
            })
          };
        }

        const response = await fetch(fetchUrl, fetchOpts);
        const endTime = performance.now();
        const text = await response.text();
        
        // Update Meta
        const statusEl = document.getElementById('res-status');
        statusEl.style.display = 'inline-block';
        statusEl.textContent = `${response.status} ${response.statusText}`;
        statusEl.className = `status-badge ${response.ok ? 'status-ok' : response.status < 500 ? 'status-warn' : 'status-err'}`;
        
        document.getElementById('res-time').textContent = `${Math.round(endTime - startTime)} ms`;
        document.getElementById('res-size').textContent = formatBytes(new Blob([text]).size);

        // Update Body Viewer
        let displayHtml = text;
        try {
          const json = JSON.parse(text);
          displayHtml = syntaxHighlight(json);
        } catch {
          displayHtml = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        document.getElementById('res-viewer').innerHTML = displayHtml || '<span style="color:var(--text-muted)">Empty response body</span>';

        // Update Headers Viewer
        const resHeaders = {};
        response.headers.forEach((v, k) => { resHeaders[k] = v; });
        document.getElementById('res-headers-viewer').innerHTML = syntaxHighlight(resHeaders);

        // Add to history
        addToHistory(method, url);

      } catch (err) {
        document.getElementById('res-status').style.display = 'inline-block';
        document.getElementById('res-status').textContent = 'ERROR';
        document.getElementById('res-status').className = 'status-badge status-err';
        document.getElementById('res-time').textContent = '-';
        document.getElementById('res-size').textContent = '-';
        
        document.getElementById('res-viewer').innerHTML = `<span style="color:var(--error)">Fetch Error: ${err.message}\n\nHint: If you are requesting an external API, it might be blocking the request due to CORS policies.</span>`;
        document.getElementById('res-headers-viewer').innerHTML = 'N/A';
      } finally {
        btn.classList.remove('loading');
      }
    }

    // ─── History ───
    function addToHistory(method, url) {
      // Avoid duplicates
      if (history.length > 0 && history[0].method === method && history[0].url === url) return;
      
      history.unshift({ method, url });
      if (history.length > 20) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = history.map((item, idx) => `
        <div class="history-item" onclick="loadHistory(${idx}, this)">
          <span class="method-badge method-${item.method}">${item.method}</span>
          <span class="history-url" title="${item.url}">${item.url}</span>
        </div>
      `).join('');
    }

    function loadHistory(idx, el) {
      document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      const item = history[idx];
      document.getElementById('method').value = item.method;
      document.getElementById('url').value = item.url;
    }
  </script>
</body>
</html>
